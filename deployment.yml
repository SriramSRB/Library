apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-app-deployment 
  labels:
    project: library
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      project: library
  template:
    metadata:
      labels:
        project: library
    spec:
      containers:
        - name: library-app
          image: sriramsrb/library-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: library-app-service
  labels:
    project: library
spec:  
  type: NodePort
  selector:
    project: library
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
